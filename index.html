<html>
<head>
<title>Pagina web</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffd6e7,#d6f0ff);
    margin:0;
}

/* MENU */

ul{
    list-style:none;
    display:flex;
    justify-content:center;
    padding:15px;
    margin:40px auto;
    width:fit-content;
    border-radius:15px;
    background: linear-gradient(90deg,#ffc8dd,#cdb4db,#bde0fe,#a2d2ff);
}

li{
    padding:12px 22px;
    margin:5px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:#444;
    transition:0.3s;
}

/* HOVER */

li:hover{
    background: linear-gradient(135deg,#ffafcc,#bde0fe);
    color:#222;
    box-shadow:0 0 10px rgba(255,255,255,0.8);
    transform:scale(1.08);
}

</style>

</head>

<body>

<ul>
<li>Inicio</li>
<li>Videos</li>
<li>Trabajo</li>
<li>Textos</li>
<li>Contacto</li>
</ul>

</body>
</html>
